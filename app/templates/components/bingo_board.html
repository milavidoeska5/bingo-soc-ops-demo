<div class="grid grid-cols-5 gap-1 w-full max-w-md mx-auto aspect-square">
    {% for square in session.board %}
    {% set is_winning = square.id in session.winning_square_ids %}
    <button
        {% if not square.is_free_space %}
        hx-post="/toggle/{{ square.id }}"
        hx-target="#game-container"
        hx-swap="outerHTML"
        {% endif %}
        {% if square.is_free_space %}disabled{% endif %}
        class="relative flex items-center justify-center p-1 text-center border rounded transition-all duration-150 select-none min-h-[60px] text-xs leading-tight
        {%- if square.is_marked %}
            {%- if is_winning %} bg-amber-200 border-amber-400 text-amber-900 glow-gold
            {%- else %} bg-marked border-marked-border text-green-800 glow-emerald
            {%- endif %}
        {%- else %} bg-white text-gray-700 active:bg-gray-100 glow-cyan
        {%- endif %}
        {%- if square.is_free_space %} font-bold text-sm{% endif %}"
        style="
        {%- if square.is_marked %}
            {%- if is_winning %} background-color: #fde68a; border-color: #fbbf24; color: #92400e;
            {%- else %} background-color: #10b981; border-color: #10b981; color: #e0e7ff;
            {%- endif %}
        {%- else %} background-color: #1a1f3a; border-color: #06b6d4; color: #a5b4fc; border-width: 1px;
        {%- endif %}"
        aria-pressed="{{ 'true' if square.is_marked else 'false' }}"
        aria-label="{{ 'Free space' if square.is_free_space else square.text }}">
        <span class="wrap-break-word hyphens-auto">{{ square.text }}</span>
        {% if square.is_marked and not square.is_free_space %}
        <span class="absolute top-0.5 right-0.5 text-green-600 text-xs" style="color: #e0e7ff;">✓</span>
        {% endif %}
    </button>
    {% endfor %}
</div>
