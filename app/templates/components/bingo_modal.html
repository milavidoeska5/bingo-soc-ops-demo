<div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50" style="background-color: rgba(0, 0, 0, 0.8);">
    <div class="bg-white rounded-xl p-6 max-w-xs w-full text-center shadow-xl animate-[bounce_0.5s_ease-out] glow-gold" style="background-color: #1a1f3a; border: 2px solid #f59e0b;">
        <div class="text-5xl mb-4">🎉</div>
        <h2 class="text-3xl font-bold text-amber-500 mb-2 text-glow-purple" style="color: #f59e0b;">BINGO!</h2>
        <p class="text-gray-600 mb-6" style="color: #a5b4fc;">You completed a line!</p>

        <button
            hx-post="/dismiss-modal"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full bg-accent text-white font-semibold py-3 px-6 rounded-lg active:bg-accent-light transition-colors glow-purple"
            style="background-color: #8b5cf6; color: #e0e7ff;">
            Keep Playing
        </button>
    </div>
</div>
