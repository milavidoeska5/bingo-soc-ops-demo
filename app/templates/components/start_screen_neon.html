<div id="game-container">
    <div class="neon-grid-bg flex flex-col items-center justify-center min-h-full p-6">
        <div class="neon-start-shell text-center max-w-sm w-full">
            <h1 class="text-4xl text-white-bold mb-2 neon-title animate-pulse-neon" aria-label="Soc Ops">
                <span class="neon-title-letter animate-letter-spacing-expand" style="--letter-delay: 0s;">S</span>
                <span class="neon-title-letter animate-letter-spacing-expand" style="--letter-delay: 0.06s;">o</span>
                <span class="neon-title-letter animate-letter-spacing-expand" style="--letter-delay: 0.12s;">c</span>
                <span class="neon-title-letter animate-letter-spacing-expand" style="--letter-delay: 0.18s;"> </span>
                <span class="neon-title-letter animate-letter-spacing-expand" style="--letter-delay: 0.24s;">O</span>
                <span class="neon-title-letter animate-letter-spacing-expand" style="--letter-delay: 0.3s;">p</span>
                <span class="neon-title-letter animate-letter-spacing-expand" style="--letter-delay: 0.36s;">s</span>
            </h1>
            <p class="text-lg text-white-bold mb-8 neon-subtitle">Social Bingo</p>

            <div class="neon-rules-grid mb-8">
                <div class="neon-rule-card neon-border-cyan animate-stagger-card-in" style="--stagger-delay: 0s;">
                    Find people who match the questions
                </div>
                <div class="neon-rule-card neon-border-magenta animate-stagger-card-in" style="--stagger-delay: 0.18s;">
                    Tap a square when you find a match
                </div>
                <div class="neon-rule-card neon-border-duo animate-stagger-card-in" style="--stagger-delay: 0.36s;">
                    Get 5 in a row to win!
                </div>
            </div>

            <button
                hx-post="/start"
                hx-target="#game-container"
                hx-swap="outerHTML"
                class="w-full text-white-bold py-4 px-8 rounded-lg text-lg transition-all neon-start-button animate-pulse-neon neon-ripple-btn"
                aria-label="Start Game">
                Start Game
            </button>
        </div>
    </div>
</div>

<script>
    if (!window.__neonRippleBound) {
        window.__neonRippleBound = true;
        document.addEventListener("pointerdown", (event) => {
            const button = event.target.closest(".neon-ripple-btn");
            if (!button) {
                return;
            }

            const rect = button.getBoundingClientRect();
            const ripple = document.createElement("span");
            ripple.className = "animate-ripple ripple-dot";
            ripple.style.left = `${event.clientX - rect.left}px`;
            ripple.style.top = `${event.clientY - rect.top}px`;
            button.appendChild(ripple);
            ripple.addEventListener("animationend", () => ripple.remove(), { once: true });
        });
    }
</script>
